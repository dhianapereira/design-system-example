name: design_system_widgetbook
description: Widgetbook for the example Flutter design system.
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  cupertino_icons: ^1.0.8
  design_system:
    path: ../../packages/design_system
  flutter:
    sdk: flutter
  widgetbook: ^3.24.0
  widgetbook_annotation: ^3.11.0

dev_dependencies:
  build_runner: ^2.6.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
