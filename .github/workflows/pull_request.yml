name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint affected packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Melos --diff needs the base branch history.
          fetch-depth: 0

      - name: Detect runtime changes
        id: changes
        uses: ./.github/actions/detect-runtime-changes

      - name: Setup Flutter Environment
        if: steps.changes.outputs.has_runtime_changes == 'true'
        uses: ./.github/actions/setup-flutter

      - name: Skip lint
        if: steps.changes.outputs.has_runtime_changes != 'true'
        run: echo "Skipping lint because this PR has no Dart or Flutter runtime changes."

      - name: Analyze affected packages
        if: steps.changes.outputs.has_runtime_changes == 'true'
        run: |
          # Root workspace files can affect every package, so they trigger a
          # full workspace analysis. Otherwise, Melos selects changed packages
          # and their dependents from the PR diff.
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- \
            pubspec.yaml \
            pubspec.lock \
            analysis_options.yaml | grep -q .; then
            dart run melos exec -c 1 --fail-fast -- flutter analyze --no-pub
          else
            dart run melos exec -c 1 --fail-fast \
              --diff="origin/${{ github.base_ref }}...HEAD" \
              --include-dependents \
              -- flutter analyze --no-pub
          fi

  test:
    name: Test affected packages
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Melos --diff needs the base branch history.
          fetch-depth: 0

      - name: Detect runtime changes
        id: changes
        uses: ./.github/actions/detect-runtime-changes

      - name: Setup Flutter Environment
        if: steps.changes.outputs.has_runtime_changes == 'true'
        uses: ./.github/actions/setup-flutter

      - name: Skip tests
        if: steps.changes.outputs.has_runtime_changes != 'true'
        run: echo "Skipping tests because this PR has no Dart or Flutter runtime changes."

      - name: Test affected packages
        if: steps.changes.outputs.has_runtime_changes == 'true'
        run: |
          # --include-dependents can bring packages without tests into the
          # affected set. The shell guard keeps those packages from failing with
          # "Test directory not found".
          test_command='if [ -d test ]; then flutter test --no-pub; else echo "Skipping tests: no test directory."; fi'

          # Root workspace files trigger every package because dependency
          # resolution or analysis options can affect the whole monorepo.
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- \
            pubspec.yaml \
            pubspec.lock \
            analysis_options.yaml | grep -q .; then
            dart run melos exec -c 1 --fail-fast \
              -- "$test_command"
          else
            dart run melos exec -c 1 --fail-fast \
              --diff="origin/${{ github.base_ref }}...HEAD" \
              --include-dependents \
              -- "$test_command"
          fi
