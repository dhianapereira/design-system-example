name: Detect Runtime Changes
description: Detect whether a pull request can affect Dart or Flutter packages.

outputs:
  has_runtime_changes:
    description: Whether the pull request changed Dart or Flutter runtime files.
    value: ${{ steps.detect.outputs.has_runtime_changes }}

runs:
  using: composite
  steps:
    - name: Detect runtime changes
      id: detect
      shell: bash
      run: |
        if git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- \
          "apps/**/*.dart" \
          "apps/**/pubspec.yaml" \
          "apps/**/analysis_options.yaml" \
          "packages/**/*.dart" \
          "packages/**/pubspec.yaml" \
          "packages/**/analysis_options.yaml" \
          "pubspec.yaml" \
          "pubspec.lock" \
          "analysis_options.yaml" | grep -q .; then
          echo "has_runtime_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_runtime_changes=false" >> "$GITHUB_OUTPUT"
        fi
